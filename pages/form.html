<!DOCTYPE html>
<html lang="en">

<!--The entirely of this html document was created using content.html as a basis after my alterations, 
followed by using snippets of the code Dr. Cumbie used in his 06c tutorial, which were AI-generated through CoPilot-->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
  >

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="../assets/css/styles.css">

  <title>Application</title>
</head>

<body>

  <main class="container py-5">

    <header class="mb-4">
      <h1>Applying for My App (Working Title)</h1>
      <p class="text-muted">
        Fill out the following form to be considered for membership.
      </p>
    </header>

    <section class="row g-4">

      <article class="p-4 p-md-5">
        <div class="card shadow-sm">
          <div class="card-body d-flex flex-column">

            <h2 class="card-title h5">Form:</h2>

            <form id="content-form" novalidate>
                <div class="row g-3">
                  <div class="col-12 col-md-8">
                    <label for="name" class="form-label">Full Name</label>
                    <input type="text" id="name" name="name" class="form-control" placeholder="Full name" required>
                    <div class="invalid-t=feedback">Please enter your name.</div>
                  </div>
                </div>

                <div class="row g-3">
                  <div class="col-12 col-md-4">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="Email Address" required>
                    <div class="invalid-t=feedback">Please enter your email.</div>
                  </div>
                </div>
            </form>

            <div class="mt-auto d-flex justify-content-between align-items-center">

              <div>
                <span class="me-3">heart</span>
                <span>edit</span>
              </div>

              <!-- This button doesn't do ANYTHING right now, and is merely for show. Functionality is the next stop to our destination. -->
              <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary">
                  <i class="bi bi-check2-circle me-1" aria-hidden="true"></i>Submit
                </button>
              </div>
            </div>

          </div>
        </div>
      </article>

    </section>

  </main>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js">
  </script>

  <script src="../assets/js/main.js"></script>

</body>
</html>
